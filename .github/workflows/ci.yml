name: CI/CD

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_FILE: docker-compose.yaml
  DOCKER_BUILDKIT: 1
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  lint:
    name: Lint (workflows, Dockerfiles, Compose)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@main

      - name: Hadolint (service Dockerfiles)
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /tmp/hadolint
          for f in user-service/Dockerfile job-service/Dockerfile proposal-service/Dockerfile contract-service/Dockerfile wallet-service/Dockerfile; do
            echo "::group::hadolint ${f}"
            /tmp/hadolint "$f" --failure-threshold error
            echo "::endgroup::"
          done

      - name: Validate Docker Compose
        run: docker compose -f docker-compose.yaml config --quiet

  java:
    name: Java (Checkstyle, build)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Checkstyle (all modules)
        run: |
          set -euo pipefail
          MODULES="security-common event-common user-service job-service proposal-service contract-service wallet-service"
          for m in $MODULES; do
            echo "::group::checkstyle ${m}"
            mvn -B -ntp -f "$m/pom.xml" org.apache.maven.plugins:maven-checkstyle-plugin:3.5.0:check \
              -Dcheckstyle.config.location="${GITHUB_WORKSPACE}/config/checkstyle-ci.xml" \
              -Dcheckstyle.consoleOutput=true
            echo "::endgroup::"
          done

      - name: Maven build
        run: mvn clean package -DskipTests

  container-images:
    name: Docker ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [java]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - job-service
          - proposal-service
          - contract-service
          - wallet-service
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image namespace (GHCR, lowercase)
        run: |
          echo "IMAGE_NAMESPACE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/freelance" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
