server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/freelancedb
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  sql:
    init:
      mode: always
      separator: '@@'
  
  application:
    name: contract-service
  
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://root:rootpass@mongo:27017/freelancemongo?authSource=admin}
    redis:
      host: redis
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD}
  
  cassandra:
    contact-points: cassandra
    port: 9042
    local-datacenter: datacenter1
    keyspace-name: freelanceks
    schema-action: CREATE_IF_NOT_EXISTS

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

cache:
  ttl:
    dashboard: ${CACHE_TTL_DASHBOARD:600}
    search: ${CACHE_TTL_SEARCH:300}
    activity: ${CACHE_TTL_ACTIVITY:300}
    detail: ${CACHE_TTL_DETAIL:900}
