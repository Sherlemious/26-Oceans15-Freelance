server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: wallet-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://wallet-postgres:5432/freelancedb-wallet}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      separator: "@@"
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:redispass}
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://mongodb:27017/freelancedb}
  cassandra:
    contact-points: ${SPRING_CASSANDRA_CONTACT_POINTS:cassandra}
    port: ${SPRING_CASSANDRA_PORT:9042}
    local-datacenter: ${SPRING_CASSANDRA_LOCAL_DATACENTER:datacenter1}
    keyspace-name: ${SPRING_CASSANDRA_KEYSPACE_NAME:freelanceks}
    schema-action: CREATE_IF_NOT_EXISTS

jwt:
  secret: ${JWT_SECRET:c2VjdXJlLWRlZmF1bHQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5}
  expiration: ${JWT_EXPIRATION:86400000}

cache:
  ttl:
    payouts: 900
    analytics: 600
    activity: 300

feign:
  user-service:
    url: ${FEIGN_USER_SERVICE_URL:http://user-service:8080}
  contract-service:
    url: ${FEIGN_CONTRACT_SERVICE_URL:http://contract-service:8080}
  job-service:
    url: ${FEIGN_JOB_SERVICE_URL:http://job-service:8080}

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
