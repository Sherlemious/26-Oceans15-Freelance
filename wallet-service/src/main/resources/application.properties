server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/freelancedb
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.sql.init.separator=@@

spring.application.name=wallet-service
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/freelancedb}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
wallet.jwt.secret=${WALLET_JWT_SECRET:wallet-service-dev-secret-change-me}
wallet.jwt.issuer=${WALLET_JWT_ISSUER:freelance-platform}
wallet.jwt.audience=${WALLET_JWT_AUDIENCE:wallet-service}
