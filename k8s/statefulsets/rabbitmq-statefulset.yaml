apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: freelance

spec:
  serviceName: rabbitmq

  replicas: 1

  selector:
    matchLabels:
      app: rabbitmq

  template:
    metadata:
      labels:
        app: rabbitmq

    spec:
      containers:
        - name: rabbitmq

          image: rabbitmq:3.13-management

          ports:
            - containerPort: 5672
              name: amqp

            - containerPort: 15672
              name: management

          env:
            - name: RABBITMQ_DEFAULT_USER
              value: guest

            - name: RABBITMQ_DEFAULT_PASS
              value: guest

          volumeMounts:
            - name: rabbitmq-storage
              mountPath: /var/lib/rabbitmq

      volumes:
        - name: rabbitmq-storage
          persistentVolumeClaim:
            claimName: rabbitmq-pvc