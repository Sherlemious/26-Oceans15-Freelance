apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: freelance
spec:
  serviceName: cassandra
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      containers:
        - name: cassandra
          image: cassandra:latest
          ports:
            - containerPort: 9042
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: freelance-contracts
            - name: CASSANDRA_DC
              value: datacenter1
            - name: CASSANDRA_RACK
              value: rack1
            - name: CASSANDRA_ENDPOINT_SNITCH
              value: GossipingPropertyFileSnitch
            - name: CASSANDRA_KEYSPACE
              value: freelanceks
          command:
            - bash
            - -c
            - |
              docker-entrypoint.sh cassandra -f &
              until /opt/cassandra/bin/cqlsh -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1; do sleep 5; done
              /opt/cassandra/bin/cqlsh -e "CREATE KEYSPACE IF NOT EXISTS $${CASSANDRA_KEYSPACE} WITH replication = {'class':'SimpleStrategy','replication_factor':1};"
              /opt/cassandra/bin/cqlsh -e "USE $${CASSANDRA_KEYSPACE}; CREATE TABLE IF NOT EXISTS contract_milestone_events (
                contract_id     bigint,
                timestamp       timestamp,
                milestone_order int,
                status          text,
                recorded_by     text,
                notes           text,
                PRIMARY KEY (contract_id, timestamp)
              ) WITH CLUSTERING ORDER BY (timestamp DESC);"
              wait
          volumeMounts:
            - name: data
              mountPath: /var/lib/cassandra
          readinessProbe:
            tcpSocket:
              port: 9042
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 8
          livenessProbe:
            tcpSocket:
              port: 9042
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cassandra-pvc
