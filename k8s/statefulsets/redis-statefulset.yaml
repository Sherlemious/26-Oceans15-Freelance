apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: freelance

spec:
  serviceName: redis

  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: redis:latest

          command:
            - redis-server
            - --requirepass
            - redispass
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru

          ports:
            - containerPort: 6379
              name: redis

          volumeMounts:
            - name: redis-storage
              mountPath: /data

          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - redispass
                - ping
            initialDelaySeconds: 10
            periodSeconds: 5

          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - redispass
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5

      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc