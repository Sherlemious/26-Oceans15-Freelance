apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: freelance

spec:
  serviceName: mongo

  replicas: 1

  selector:
    matchLabels:
      app: mongo

  template:
    metadata:
      labels:
        app: mongo

    spec:
      containers:
        - name: mongo
          image: mongo:7.0

          ports:
            - containerPort: 27017
              name: mongodb

          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db

      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongo-pvc