apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboard-provider.yaml
              subPath: dashboard-provider.yaml
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: storage
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboards
            items:
              - key: dashboard-provider.yaml
                path: dashboard-provider.yaml
        - name: dashboards
          configMap:
            name: grafana-dashboards
            items:
              - key: user-dashboard.json
                path: user-dashboard.json
              - key: job-dashboard.json
                path: job-dashboard.json
              - key: proposal-dashboard.json
                path: proposal-dashboard.json
              - key: contract-dashboard.json
                path: contract-dashboard.json
              - key: wallet-dashboard.json
                path: wallet-dashboard.json
        - name: storage
          persistentVolumeClaim:
            claimName: grafana-pvc
