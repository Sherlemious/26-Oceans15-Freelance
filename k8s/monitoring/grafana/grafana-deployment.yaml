apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring

spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana

    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2

          ports:
            - containerPort: 3000

          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin

            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin

          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana

            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources/

            - name: grafana-dashboards
              mountPath: /etc/grafana/provisioning/dashboards/

            - name: grafana-dashboard-json
              mountPath: /var/lib/grafana/dashboards

      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc

        - name: grafana-datasources
          configMap:
            name: grafana-datasources

        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
            items:
              - key: dashboards-provider.yaml
                path: dashboards-provider.yaml

        - name: grafana-dashboard-json
          configMap:
            name: grafana-dashboards
            items:
              - key: user-dashboard.json
                path: user-dashboard.json

              - key: job-dashboard.json
                path: job-dashboard.json

              - key: proposal-dashboard.json
                path: proposal-dashboard.json

              - key: contract-dashboard.json
                path: contract-dashboard.json

              - key: wallet-dashboard.json
                path: wallet-dashboard.json