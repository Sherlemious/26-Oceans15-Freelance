apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring

data:
  dashboards-provider.yaml: |
    apiVersion: 1

    providers:
      - name: Freelance
        orgId: 1
        folder: Freelance
        type: file
        disableDeletion: false
        editable: true

        options:
          path: /var/lib/grafana/dashboards

  user-dashboard.json: |
{{ .Files.Get "k8s/monitoring/grafana/dashboards/user-dashboard.json" | indent 4 }}

  job-dashboard.json: |
{{ .Files.Get "k8s/monitoring/grafana/dashboards/job-dashboard.json" | indent 4 }}

  proposal-dashboard.json: |
{{ .Files.Get "k8s/monitoring/grafana/dashboards/proposal-dashboard.json" | indent 4 }}

  contract-dashboard.json: |
{{ .Files.Get "k8s/monitoring/grafana/dashboards/contract-dashboard.json" | indent 4 }}

  wallet-dashboard.json: |
{{ .Files.Get "k8s/monitoring/grafana/dashboards/wallet-dashboard.json" | indent 4 }}