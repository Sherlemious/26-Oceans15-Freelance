server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: proposal-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://proposal-postgres:5432/freelancedb-proposals}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      separator: "@@"
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://mongodb:27017/freelancedb}
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redispass}
  neo4j:
    uri: ${NEO4J_URI:bolt://neo4j:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:password}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

jwt:
  secret: ${JWT_SECRET:c2VjdXJlLWRlZmF1bHQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5}
  expiration: ${JWT_EXPIRATION:86400000}

loki:
  url: ${LOKI_URL:http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push}

cache:
  ttl:
    proposals: ${CACHE_TTL_DETAIL:300}
    search: ${CACHE_TTL_SEARCH:60}
    analytics: ${CACHE_TTL_DASHBOARD:600}
    activity: ${CACHE_TTL_ACTIVITY:120}

feign:
  user-service:
    url: ${FEIGN_USER_SERVICE_URL:http://user-service:8080}
  job-service:
    url: ${FEIGN_JOB_SERVICE_URL:http://job-service:8080}
  contract-service:
    url: ${FEIGN_CONTRACT_SERVICE_URL:http://contract-service:8080}

saga:
  payout:
    abandon-after: ${SAGA_PAYOUT_ABANDON_AFTER:PT72H}

management:
  endpoints:
    web:
      exposure:
        include: "prometheus,health,info"
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  endpoint:
    health:
      show-details: always